<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout Effettuato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/global.css" rel="stylesheet">
    <link href="/css/logout_success.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-box-seam"></i> Catalogo Fornitori</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="success-container">
            <div class="success-icon">
                <i class="bi bi-check-lg"></i>
            </div>
            <h1>Logout Effettuato</h1>
            <p class="success-message">
                Sei stato disconnesso con successo dal tuo account.
            </p>
            
            <div class="button-group">
                <a href="/" class="btn btn-primary-logout">
                    <i class="bi bi-house"></i> Torna alla Home
                </a>
                <a href="/login" class="btn btn-secondary-logout">
                    <i class="bi bi-box-arrow-in-right"></i> Accedi di Nuovo
                </a>
            </div>

            <div class="countdown">
                Reindirizzamento automatico tra <span class="countdown-number"><span id="timer">30</span>s</span>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let timeLeft = 30;
        const timerElement = document.getElementById('timer');

        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = '/';
            }
        }, 1000);
    </script>
</body>
</html>
